on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

name: Build - Push
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

  swagger-spec:
    name: Generate - Swagger Spec
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Restore - Tools
      run: dotnet tool restore
      working-directory: src

    - name: Build
      run: dotnet build src/RestfulService.slnx --configuration Release

    - name: Generate - Swagger Spec
      run: |
        mkdir -p ../.github/artifacts
        dotnet tool run swagger tofile --output ../.github/artifacts/swagger.json RestfulService/bin/Release/net10.0/RestfulService.dll v1
      working-directory: src

    - name: Commit - Swagger Spec
      run: |-
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .github/artifacts/swagger.json
        git diff --cached --quiet || git commit -m "ci: commit generated swagger.json [skip actions]"
        git push
